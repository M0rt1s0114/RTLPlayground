name: Build Firmware

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      machine:
        description: "Target machine (leave empty to build all)"
        required: false
        default: ""
      release:
        description: "Create a GitHub Release after build?"
        type: boolean
        required: false
        default: false

jobs:
  # в”Ђв”Ђ 1. Determine which machines to build в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  setup:
    name: Resolve build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set matrix
        id: set-matrix
        run: |
          INPUT="${{ github.event.inputs.machine }}"
          if [ -n "$INPUT" ]; then
            MATRIX="{\"machine\":[\"${INPUT}\"]}"
          else
            MACHINES=$(ls boards/*.yaml | sed 's|boards/||;s|\.yaml||' | tr '\n' ' ' | sed 's/ $//')
            JSON="[$(echo "$MACHINES" | sed 's/ /","/g;s/^/"/;s/$/"/' )]"
            MATRIX="{\"machine\":${JSON}}"
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # в”Ђв”Ђ 2. Build every machine in parallel в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  build:
    name: Build В· ${{ matrix.machine }}
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install toolchain
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            make gcc libc6-dev sdcc xxd python-is-python3 python3-yaml libjson-c-dev git ca-certificates

      - name: Build ${{ matrix.machine }}
        run: make MACHINE="${{ matrix.machine }}"

      - name: Locate firmware binary
        id: locate
        run: |
          BIN=$(find output/ -name "*.bin" ! -name "rtlplayground.bin" | head -1)
          echo "path=$BIN" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$BIN")" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.machine }}
          path: ${{ steps.locate.outputs.path }}
          if-no-files-found: error
          retention-days: 30

  # в”Ђв”Ђ 3. Validate all board YAML files compile cleanly в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  machine-check:
    name: Validate all boards
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install toolchain
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            make gcc libc6-dev sdcc xxd python-is-python3 python3-yaml libjson-c-dev git

      - name: Check all boards
        run: make machine_check MACHINE=machine_check_placeholder

  # в”Ђв”Ђ 4. Bundle every .bin into one release archive в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  release:
    name: Create GitHub Release
    needs: [build, machine-check]
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-bins
          pattern: firmware-*
          merge-multiple: true

      - name: List collected binaries
        run: ls -lh release-bins/

      - name: Set release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TS=$(date +'%Y%m%d-%H%M%S')
            echo "name=Manual Build ${TS}" >> "$GITHUB_OUTPUT"
            echo "tag=manual-${TS}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "name=RTLPlayground ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            REF="${{ github.ref_name }}"
            if echo "$REF" | grep -qE '\-(rc|beta)'; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create release archive
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          zip "RTLPlayground-firmware-${TAG}-all-machines.zip" release-bins/*.bin
          sha256sum release-bins/*.bin > "RTLPlayground-firmware-${TAG}-SHA256SUMS.txt"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.tag.outputs.name }}
          tag_name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-bins/*.bin
            RTLPlayground-firmware-${{ steps.tag.outputs.tag }}-all-machines.zip
            RTLPlayground-firmware-${{ steps.tag.outputs.tag }}-SHA256SUMS.txt
