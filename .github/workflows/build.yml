name: Build Firmware

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      machine:
        description: "Target machine (leave empty to build all)"
        required: false
        default: ""

jobs:
  # ── 1. Determine which machines to build ──────────────────────────────────
  setup:
    name: Resolve build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - id: set-matrix
        run: |
          INPUT="${{ github.event.inputs.machine }}"
          if [ -n "$INPUT" ]; then
            MATRIX=$(printf '{"machine":["%s"]}' "$INPUT")
          else
            # Auto-discover boards from boards/ directory
            MACHINES=$(ls boards/*.yaml | sed 's|boards/||;s|\.yaml||' | \
              python3 -c "
import sys, json
names = sys.stdin.read().split()
print(json.dumps({'machine': names}))
")
            MATRIX=$MACHINES
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # ── 2. Build every machine in parallel ────────────────────────────────────
  build:
    name: Build · ${{ matrix.machine }}
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install toolchain
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            make gcc libc6-dev sdcc xxd python-is-python3 libjson-c-dev git ca-certificates
          pip install --break-system-packages --quiet pyyaml

      - name: Build ${{ matrix.machine }}
        run: make MACHINE="${{ matrix.machine }}"

      - name: Locate firmware binary
        id: locate
        run: |
          BIN=$(find output/ -name "*.bin" ! -name "rtlplayground.bin" | head -1)
          echo "path=$BIN" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$BIN")" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.machine }}
          path: ${{ steps.locate.outputs.path }}
          if-no-files-found: error
          retention-days: 30

  # ── 3. Validate all board YAML files compile cleanly ──────────────────────
  machine-check:
    name: Validate all boards
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install toolchain
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            make gcc libc6-dev sdcc xxd python-is-python3 libjson-c-dev git
          pip install --break-system-packages --quiet pyyaml

      - name: Check all boards
        run: make machine_check

  # ── 4. Bundle every .bin into one release archive (tags only) ─────────────
  release:
    name: Create GitHub Release
    needs: [build, machine-check]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-bins
          pattern: firmware-*
          merge-multiple: true

      - name: List collected binaries
        run: ls -lh release-bins/

      - name: Create release archive
        run: |
          TAG="${{ github.ref_name }}"
          zip "RTLPlayground-firmware-${TAG}-all-machines.zip" release-bins/*.bin
          sha256sum release-bins/*.bin > "RTLPlayground-firmware-${TAG}-SHA256SUMS.txt"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          name: "RTLPlayground ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          generate_release_notes: true
          files: |
            release-bins/*.bin
            RTLPlayground-firmware-${{ github.ref_name }}-all-machines.zip
            RTLPlayground-firmware-${{ github.ref_name }}-SHA256SUMS.txt
