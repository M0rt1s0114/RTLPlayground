name: Build Firmware

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      machine:
        description: "Target machine (leave empty to build all)"
        required: false
        default: ""

jobs:
  # ── 1. Determine which machines to build ──────────────────────────────────
  setup:
    name: Resolve build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          ALL='["DEFAULT_8C_1SFP","FNS1200P","HG0402XG_V1_1","HI_K0801WS","K0501W_V2_0",
                "KP_9000_6XHML_X2","KP_9000_6XH_X","KP_9000_6XH_X2",
                "KP_9000_9XHML_X_V2_2","KP_9000_9XHML_X_V3_1","KP_9000_9XH_X_EU",
                "LIANGUO_ZX_SWTGW215AS","PCB_SWTG024AS_A_2_0_1","STEAMEMO_IG204_V1",
                "SWGT024_V2_0_MANAGED","SWGT024_V2_0_UNMANAGED","SWTG018AS_A_V_2_0",
                "SWTG024AS_V2_0","SWTGW218AS","TRENDNET_TEG_S562",
                "ZX310S_4T2XH","ZX310S_4T2XT"]'

          INPUT="${{ github.event.inputs.machine }}"
          if [ -n "$INPUT" ]; then
            MATRIX=$(printf '{"machine":["%s"]}' "$INPUT")
          else
            MATRIX=$(echo "$ALL" | tr -d '[:space:]' | sed 's/^/{"machine":/' | sed 's/$/}/')
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # ── 2. Build every machine in parallel ────────────────────────────────────
  build:
    name: Build · ${{ matrix.machine }}
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            make gcc sdcc xxd python-is-python3 libjson-c-dev git ca-certificates

      - name: Build ${{ matrix.machine }}
        id: build
        run: make MACHINE="${{ matrix.machine }}"

      - name: Locate firmware binary
        id: locate
        run: |
          BIN=$(find output/ -name "*.bin" ! -name "rtlplayground.bin" | head -1)
          echo "path=$BIN" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $BIN)" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.machine }}
          path: ${{ steps.locate.outputs.path }}
          if-no-files-found: error
          retention-days: 30

  # ── 3. Validate machine.c compiles for ALL targets (sanity gate) ──────────
  machine-check:
    name: Validate machine.c (all targets)
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            make gcc sdcc xxd python-is-python3 libjson-c-dev

      - name: Check machine.c for all machines
        run: make machine_check

  # ── 4. Bundle every .bin into one release archive (tags only) ─────────────
  release:
    name: Create GitHub Release
    needs: [build, machine-check]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-bins
          pattern: firmware-*
          merge-multiple: true

      - name: List collected binaries
        run: ls -lh release-bins/

      - name: Create release archive
        run: |
          TAG="${{ github.ref_name }}"
          zip "RTLPlayground-firmware-${TAG}-all-machines.zip" release-bins/*.bin
          sha256sum release-bins/*.bin > "RTLPlayground-firmware-${TAG}-SHA256SUMS.txt"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "RTLPlayground ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          generate_release_notes: true
          files: |
            release-bins/*.bin
            RTLPlayground-firmware-${{ github.ref_name }}-all-machines.zip
            RTLPlayground-firmware-${{ github.ref_name }}-SHA256SUMS.txt
