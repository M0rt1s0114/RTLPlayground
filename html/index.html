<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeSwitchOS · 概览</title>
  <link rel="stylesheet" href="style.css">
  <script src="/main.js"></script>
  <script src="/main_info.js"></script>
  <script>
  window.addEventListener('load', function () {
    update(function () { setInterval(update, 2000); });
  });
  </script>
</head>
<body>
  <nav id="sidebar"></nav>
  <div class="main-wrap">
    <h1>概览</h1>
    <div id="ports"></div>
    <h2>端口状态</h2>
    <table id="statstable" style="width:100%;margin-bottom:20px;">
      <thead>
        <tr>
          <th>端口</th><th>名称</th><th>链路</th>
          <th>发送（正常）</th><th>发送（异常）</th>
          <th>接收（正常）</th><th>接收（异常）</th>
        </tr>
      </thead>
      <tbody id="portStatusBody"></tbody>
    </table>
    <h2>交换机信息</h2>
    <table id="infoTable" style="width:480px;">
      <thead><tr><th colspan="2">基本信息</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <script src="/navigation.js"></script>
  <script>
  /* 概览页：复用 update() 的数据填充端口状态表 */
  var _origUpdate = typeof update === 'function' ? update : null;
  function fillPortStatus(ports) {
    var tb = document.getElementById('portStatusBody');
    if (!tb || !ports) return;
    var linkNames = ['禁用','断开','10M','100M','1G','500M','10G','2.5G','5G'];
    tb.innerHTML = '';
    ports.forEach(function (p) {
      var tr = document.createElement('tr');
      var link = p.enabled == 0 ? '禁用' : (linkNames[p.link + 1] || '未知');
      var cells = [p.portNum, p.name || '—', link, p.txG, p.txB, p.rxG, p.rxB];
      cells.forEach(function (v, i) {
        var td = document.createElement('td');
        td.textContent = v;
        if (i === 2) {
          td.style.fontFamily = 'var(--ui)';
          if (p.enabled == 0 || p.link <= 0) td.style.color = 'var(--mut)';
          else if (p.link >= 5) td.style.color = 'var(--acc)';
          else td.style.color = 'var(--grn)';
        }
        tr.appendChild(td);
      });
      tb.appendChild(tr);
    });
  }
  /* 覆盖 update 的回调，在端口数据就绪后填表 */
  var _patchInterval;
  function patchUpdate() {
    var xhttp = new XMLHttpRequest();
    xhttp.onreadystatechange = function () {
      if (this.readyState == 4 && this.status == 200) {
        try { fillPortStatus(JSON.parse(this.responseText)); } catch(e){}
      }
    };
    xhttp.open('GET', '/status.json', true);
    xhttp.timeout = 5000;
    sendXHTTP(xhttp);
  }
  window.addEventListener('load', function () {
    setTimeout(function loop() { patchUpdate(); setTimeout(loop, 2000); }, 500);
  });
  </script>
</body>
</html>
