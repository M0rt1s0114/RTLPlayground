<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeSwitchOS · Port Configuration</title>
  <link rel="stylesheet" href="style.css">
  <script src="/main.js"></script>
</head>
<body>
  <nav id="sidebar"></nav>
  <div class="main-wrap">
    <h1>Port Configuration</h1>
    <div id="ports"></div>
    <h2>Link Speed</h2>
    <table id="speedtable" style="width:100%;max-width:760px;">
      <thead>
        <tr>
          <th>Port</th>
          <th>Name</th>
          <th>Current Speed</th>
          <th>Set Speed</th>
          <th>Disabled</th>
          <th>Apply</th>
        </tr>
      </thead>
    </table>
    <h2 style="margin-top:32px;">Maximum Frame Size (MTU)</h2>
    <table id="mtutable" style="margin-top:12px;"></table>
    <script src="/ports.js"></script>
  </div>
  <script src="/navigation.js"></script>
</body>
</html>
