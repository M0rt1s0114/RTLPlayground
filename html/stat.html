<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeSwitchOS · Port Statistics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="/main.js"></script>
</head>
<body>
  <nav id="sidebar"></nav>

  <!-- Counters popup/modal -->
  <div id="popup" class="popup">
    <div class="popup-content">
      <h2>Detailed Port Statistics</h2>
      <div id="popup_text"></div>
      <div style="margin-top:16px;">
        <button id="closePopup">Close</button>
      </div>
    </div>
  </div>

  <div style="margin-left:var(--sidebar-w, 220px);padding:28px 32px;">
    <h1>Port Statistics</h1>
    <div id="ports"></div>
    <table id="statstable" style="width:100%;">
      <thead>
        <tr>
          <th>Port</th>
          <th>Name</th>
          <th>Link</th>
          <th>TX Good</th>
          <th>TX Bad</th>
          <th>RX Good</th>
          <th>RX Bad</th>
          <th>Counters</th>
        </tr>
      </thead>
      <script src="/stat.js"></script>
    </table>
  </div>
  <script src="/navigation.js"></script>
</body>
</html>
