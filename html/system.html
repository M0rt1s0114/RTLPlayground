<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeSwitchOS · 系统设置</title>
  <link rel="stylesheet" href="style.css">
  <script src="/main.js"></script>
</head>
<body>
  <nav id="sidebar"></nav>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="openTab(event,'tab-system')">网络</button>
    <button class="tab-btn" onclick="openTab(event,'tab-advanced')">高级</button>
    <button class="tab-btn" onclick="openTab(event,'tab-console')">控制台</button>
  </div>
  <div class="main-wrap">
    <div id="ports"></div>

    <div id="tab-system" class="tab-content active">
      <h1>网络设置</h1>
      <div class="card" style="max-width:420px;">
        <div class="row"><div class="lcol"><label for="ip">IP 地址</label></div>
          <div class="rcol"><input id="ip" class="ip" type="text" minlength="7" maxlength="15" size="15" placeholder="192.168.1.1"></div></div>
        <div class="row"><div class="lcol"><label for="netmask">子网掩码</label></div>
          <div class="rcol"><input id="netmask" class="ip" type="text" minlength="7" maxlength="15" size="15" placeholder="255.255.255.0"></div></div>
        <div class="row"><div class="lcol"><label for="gw">默认网关</label></div>
          <div class="rcol"><input id="gw" class="ip" type="text" minlength="7" maxlength="15" size="15" placeholder="192.168.1.254"></div></div>
        <p class="note" style="margin-top:12px;">修改 IP 后请更新浏览器地址栏中的地址。</p>
        <div style="display:flex;gap:10px;margin-top:4px;">
          <button id="ip_sub" onclick="ipSub();">更新网络设置</button>
        </div>
      </div>
      <div class="card" style="margin-top:20px;max-width:420px;">
        <h2 style="margin-top:0;">Flash 存储</h2>
        <p class="note">将当前运行配置保存到 Flash 持久化存储。</p>
        <button id="flash_sub" onclick="flashSave();">保存配置到 Flash</button>
      </div>
    </div>

    <div id="tab-advanced" class="tab-content">
      <h1>高级设置</h1>
      <div class="card" style="max-width:640px;">
        <label style="font-size:12px;color:var(--mut);display:block;margin-bottom:8px;">启动配置</label>
        <textarea id="config_display" rows="10"></textarea>
        <p class="warn" style="margin-top:10px;">⚠ 写入格式错误的配置可能导致设备无法访问。</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;">
          <button id="clear_config" onclick="clearConfig();">清除配置</button>
          <button id="flash_startup_sub" onclick="flashStartupSave();">保存启动配置到 Flash</button>
          <button id="switch_reset" onclick="resetSwitch();" style="color:var(--red);border-color:var(--red);">重置交换机</button>
        </div>
      </div>
    </div>

    <div id="tab-console" class="tab-content">
      <h1>控制台</h1>
      <div class="card" style="max-width:640px;">
        <label style="font-size:12px;color:var(--mut);display:block;margin-bottom:8px;" for="console_cmd">命令</label>
        <div style="display:flex;gap:8px;">
          <input type="text" id="console_cmd" name="console_cmd" style="flex:1;" placeholder="例：port 1 auto">
          <button id="cmd_sub" onclick="cmdSub();">发送</button>
        </div>
        <p class="warn" style="margin-top:10px;">⚠ 输入错误命令可能导致设备无法访问。</p>
      </div>
    </div>
  </div>
  <script src="/config.js"></script>
  <script src="/system.js"></script>
  <script src="/navigation.js"></script>
  <script>
  function openTab(evt, id) {
    document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
    document.getElementById(id).classList.add('active');
    evt.currentTarget.classList.add('active');
  }
  </script>
</body>
</html>
