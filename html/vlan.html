<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeSwitchOS · VLAN Configuration</title>
  <link rel="stylesheet" href="style.css">
  <script src="/main.js"></script>
</head>
<body>
  <nav id="sidebar"></nav>
  <div class="main-wrap">
    <h1>VLAN Configuration</h1>
    <div id="ports"></div>

    <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:16px;">
      <div>
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">Select VLAN</label>
        <select id="vlanSelect">
          <option value="" disabled selected>— choose VLAN —</option>
        </select>
      </div>
      <div>
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">VLAN ID</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="number" min="1" max="4094" id="vid" name="vid" style="width:90px;">
          <button type="button" onclick="fetchVLAN();">Load</button>
        </div>
      </div>
      <div>
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">VLAN Name</label>
        <input type="text" id="vname" name="vname" style="width:180px;">
      </div>
    </div>

    <h2>Tagged Ports
      <button type="button" style="margin-left:16px;font-size:11px;padding:4px 10px;" onclick="utClicked(true);">Select all</button>
    </h2>
    <div id="tPorts" style="margin-bottom:16px;"></div>

    <h2>Untagged Ports
      <button type="button" style="margin-left:16px;font-size:11px;padding:4px 10px;" onclick="utClicked(false);">Select all</button>
    </h2>
    <div id="uPorts" style="margin-bottom:16px;"></div>

    <h2>PVID Ports (default VLAN for ingress)
      <button type="button" style="margin-left:16px;font-size:11px;padding:4px 10px;" onclick="pvClicked(true);">Select all</button>
    </h2>
    <div id="pPorts" style="margin-bottom:20px;"></div>

    <div>
      <button type="button" id="vlan_sub" onclick="vlanSub();">Update / Create VLAN</button>
    </div>
    <script src="/vlan.js"></script>
    <script src="/vlan_sub.js"></script>

    <h2 style="margin-top:32px;">Configured VLANs</h2>
    <table id="vlanTable" style="width:100%;">
      <thead>
        <tr>
          <th>VLAN</th>
          <th>Name</th>
          <th>Members</th>
          <th>Tagged</th>
          <th>Untagged</th>
          <th>PVID</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="vlanTableBody"></tbody>
    </table>
  </div>
  <script src="/navigation.js"></script>
</body>
</html>
